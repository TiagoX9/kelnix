    <script>
      window.dataLayer = window.dataLayer || [];

      // Consent Mode v2: default every signal to "denied" until the EU visitor

        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'denied',
        personalization_storage: 'denied',
        security_storage: 'granted',
        wait_for_update: 500,
      });

      gtag('js', new Date());

      // SPA: page_view is sent manually on every route change (see usePageTracking),
      // so disable the automatic initial page_view to avoid double-counting.
      gtag('config', 'G-ZLL567MV9Q', { send_page_view: false });
    </script>

    <!-- Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
